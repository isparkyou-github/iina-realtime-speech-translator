<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { padding: 0 4px; }
    input[type="text"], input[type="password"], input[type="number"], select {
      width: 100%;
      box-sizing: border-box;
      margin-top: 4px;
    }
    label span {
      display: block;
      margin-bottom: 2px;
    }
  </style>
</head>
<body>
  <div class="pref-section">
    <label>
      <input type="checkbox" data-type="bool" data-pref-key="enabled">
      Enable realtime speech translation
    </label>
  </div>

  <div class="pref-section">
    <label>
      <span>API key</span>
      <input type="password" data-pref-key="apiKey">
    </label>
  </div>

  <div class="pref-section">
    <label>
      <span>Speech transcription URL</span>
      <input type="text" data-pref-key="transcriptionUrl">
    </label>
    <p class="small secondary pref-help">Example: https://api.openai.com/v1/audio/transcriptions</p>
  </div>

  <div class="pref-section">
    <label>
      <span>Speech transcription model</span>
      <input type="text" data-pref-key="transcriptionModel">
    </label>
  </div>

  <div class="pref-section">
    <label>
      <span>Transcription prompt</span>
      <input type="text" data-pref-key="transcriptionPrompt">
    </label>
    <p class="small secondary pref-help">Optional terms, names, or context to improve speech recognition.</p>
  </div>

  <div class="pref-section">
    <label>
      <span>Chat translation URL</span>
      <input type="text" data-pref-key="chatUrl">
    </label>
    <p class="small secondary pref-help">Example: https://api.openai.com/v1/chat/completions</p>
  </div>

  <div class="pref-section">
    <label>
      <span>Chat translation model</span>
      <input type="text" data-pref-key="chatModel">
    </label>
  </div>

  <div class="pref-section">
    <label>
      <span>Target language</span>
      <input type="text" data-pref-key="targetLanguage">
    </label>
  </div>

  <div class="pref-section">
    <label>
      <span>Source language</span>
      <input type="text" data-pref-key="sourceLanguage">
    </label>
    <p class="small secondary pref-help">Use auto to let the model detect it, or use a language code such as en, ja, ko.</p>
  </div>

  <div class="pref-section">
    <label>
      <input type="checkbox" data-type="bool" data-pref-key="showTranscript">
      Show recognized speech above translation
    </label>
  </div>

  <div class="pref-section">
    <label>
      <span>Audio chunk seconds</span>
      <input type="number" data-type="int" min="2" max="12" data-pref-key="chunkSeconds">
    </label>
  </div>

  <div class="pref-section">
    <label>
      <span>Poll interval, ms</span>
      <input type="number" data-type="int" min="500" max="5000" step="100" data-pref-key="pollIntervalMs">
    </label>
  </div>

  <div class="pref-section">
    <label>
      <span>Max catch-up window, seconds</span>
      <input type="number" data-type="int" min="4" max="30" data-pref-key="maxCatchupSeconds">
    </label>
  </div>

  <div class="pref-section">
    <label>
      <span>Font size</span>
      <input type="number" data-type="int" min="14" max="72" data-pref-key="fontSize">
    </label>
  </div>

  <div class="pref-section">
    <label>
      <span>Bottom offset, vh</span>
      <input type="number" data-type="int" min="2" max="35" data-pref-key="bottomOffset">
    </label>
  </div>

  <div class="pref-section">
    <label>
      <span>Max overlay width, vw</span>
      <input type="number" data-type="int" min="35" max="100" data-pref-key="maxWidth">
    </label>
  </div>
</body>
</html>
